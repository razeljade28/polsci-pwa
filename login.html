<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEPOLSCIS – Login</title>
  <meta name="theme-color" content="#759954" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-circle bg-one"></div>
  <div class="bg-circle bg-two"></div>
  <div class="bg-circle bg-three"></div>

  <section id="login-screen" class="screen active">
    <div class="login-wrapper">
      <div class="hero">
        <div class="hero-icon">
          <span class="material-symbols-rounded">account_balance</span>
        </div>
        <h1>SEPOLSCIS</h1>
        <p>Student Excellence in Political Science</p>
      </div>
      <div class="login-card">
        <div class="login-header">
          <h2>Welcome Back</h2>
          <span>Sign in to continue</span>
        </div>
        <div class="form-group">
          <label>Student ID</label>
          <div class="input-box">
            <span class="material-symbols-rounded">badge</span>
            <input id="student-id" type="text" placeholder="2026-00001" autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-box">
            <span class="material-symbols-rounded">lock</span>
            <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
          </div>
        </div>
        <p class="login-help"><span class="material-symbols-rounded">verified_user</span> Your account access is assigned by SEPOLSCIS.</p>
        <button id="login-btn" class="btn-primary">
          <span class="material-symbols-rounded">login</span>
          Login
        </button>
        <div class="login-footer">
          <button class="text-btn" onclick="alert('SEPOLSCIS v3.0')">About</button>
          <button class="text-btn" id="install-prompt-btn">Install App</button>
        </div>
        <div style="text-align:center;margin-top:16px;">
          <span style="color:var(--text-light);">Don't have an account? </span>
          <a href="signup.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Sign Up</a>
        </div>
      </div>
    </div>
  </section>

  <div id="toast-container"></div>

  <script type="module">
    import { Auth, UI } from './scripts/auth.js';
    import { Storage } from './scripts/storage.js';
    if (Auth.init()) window.location.href = 'index.html';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const studentId = document.getElementById('student-id').value.trim();
      const password = document.getElementById('password').value.trim();
      const result = await Auth.login(studentId, password);
      if (result.success) {
        UI.toast({ message: `Welcome, ${result.user.name}!`, type: 'success' });
        setTimeout(() => window.location.href = 'index.html', 500);
      } else {
        UI.toast({ message: result.message, type: 'error' });
      }
    });

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    document.getElementById('student-id').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      document.getElementById('install-prompt-btn').addEventListener('click', () => {
        if (window.deferredPrompt) {
          window.deferredPrompt.prompt();
        } else {
          UI.toast({ message: 'Install from browser menu.', type: 'info' });
        }
      });
    });
  </script>
</body>
</html>
