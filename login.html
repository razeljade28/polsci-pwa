<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolSci Org – Login</title>
    <meta name="theme-color" content="#759954" />

    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />

    <!-- Shared styles -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Background Decorations -->
    <div class="bg-gradient"></div>
    <div class="bg-circle bg-one"></div>
    <div class="bg-circle bg-two"></div>
    <div class="bg-circle bg-three"></div>

    <!-- Login Screen (full page) -->
    <section id="login-screen" class="screen active">
        <div class="login-wrapper">
            <div class="hero">
                <div class="hero-icon">
                    <span class="material-symbols-rounded">account_balance</span>
                </div>
                <h1>Political Science<br />Student Organization</h1>
                <p>Your all-in-one organization hub.</p>
            </div>

            <div class="login-card">
                <div class="login-header">
                    <h2>Welcome Back</h2>
                    <span>Sign in to continue</span>
                </div>

                <div class="form-group">
                    <label>Student ID</label>
                    <div class="input-box">
                        <span class="material-symbols-rounded">badge</span>
                        <input id="student-id" type="text" placeholder="2026-00001" autocomplete="username" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-box">
                        <span class="material-symbols-rounded">lock</span>
                        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Login As</label>
                    <div class="input-box">
                        <span class="material-symbols-rounded">groups</span>
                        <select id="role-select">
                            <option value="member">Member</option>
                            <option value="officer">Officer</option>
                            <option value="grievance">Grievance Committee</option>
                            <option value="adviser">Adviser / Dean</option>
                        </select>
                    </div>
                </div>

                <button id="login-btn" class="btn-primary">
                    <span class="material-symbols-rounded">login</span>
                    Login
                </button>

                <div class="login-footer">
                    <button class="text-btn" onclick="alert('PolSci Org v2.0')">About</button>
                    <button class="text-btn" id="install-prompt-btn">Install App</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast container for login feedback -->
    <div id="toast-container"></div>

    <!-- Shared app logic (auth, storage, UI helpers) -->
    <script type="module" src="app.js"></script>

    <!-- Login page specific logic -->
    <script type="module">
        import { Auth, UI, Storage } from './app.js';

        // Redirect if already logged in
        if (Auth.init()) {
            window.location.href = 'index.html';
        }

        document.getElementById('login-btn').addEventListener('click', () => {
            const studentId = document.getElementById('student-id').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role-select').value;

            const result = Auth.login(studentId, password, role);
            if (result.success) {
                UI.toast({ message: `Welcome, ${result.user.name}!`, type: 'success' });
                // Redirect to main app
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                UI.toast({ message: result.message, type: 'error' });
            }
        });

        // Enter key support
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });
        document.getElementById('student-id').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });

        // Install prompt (shared)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
            document.getElementById('install-prompt-btn').addEventListener('click', () => {
                if (window.deferredPrompt) {
                    window.deferredPrompt.prompt();
                } else {
                    UI.toast({ message: 'Install from browser menu.', type: 'info' });
                }
            });
        });
    </script>

</body>

</html>
