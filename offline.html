<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - SEPOLSCIS</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(180deg, #f6fbf2, #eef6e0);
        font-family:
          Plus Jakarta Sans,
          system-ui,
          Arial,
          sans-serif;
        color: #334;
      }
      .card {
        background: white;
        padding: 28px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        max-width: 520px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 12px;
        background: url("logo.png") center/contain no-repeat;
      }
      a {
        color: #4e9b54;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true"></div>
      <h1>You are offline</h1>
      <p>
        SEPOLSCIS is not connected to the network. You can still access cached
        pages and features.
      </p>
      <p>
        <a href="/">Return to app</a> or check your connection and try again.
      </p>
    </div>
  </body>
</html>
