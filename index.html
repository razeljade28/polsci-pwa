<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SEPOLSCIS</title>
    <meta name="theme-color" content="#759954" />
    <meta name="description" content="SEPOLSCIS – Student Excellence in Political Science" />

    <link rel="manifest" href="manifest.json" />
    <!-- Fallback icon if manifest icons missing -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='60' fill='%23759954'/><text x='256' y='340' font-size='280' text-anchor='middle' fill='white' font-family='sans-serif'>⚖️</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Background Decorations -->
    <div class="bg-gradient"></div>
    <div class="bg-circle bg-one"></div>
    <div class="bg-circle bg-two"></div>
    <div class="bg-circle bg-three"></div>

    <!-- Loading Screen with Logo -->
    <div id="loading-screen">
        <div class="loader-logo">
            <div class="loader-ring"></div>
            <div class="loader-icon">
                <!-- Inline SVG icon instead of missing logo.png -->
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <rect width="100" height="100" rx="20" fill="#759954" />
                    <text x="50" y="70" font-size="60" text-anchor="middle" fill="white" font-family="sans-serif">⚖️</text>
                </svg>
            </div>
        </div>
        <h2>SEPOLSCIS</h2>
        <p>Student Excellence in Political Science</p>
    </div>

    <!-- ===================================================== -->
    <!-- MAIN APP SCREEN -->
    <!-- ===================================================== -->
    <section id="main-screen" class="screen active">

        <!-- Pull-to-refresh indicator -->
        <div id="pull-indicator" style="text-align:center;padding:10px;color:var(--text-light);display:none;">
            <span class="material-symbols-rounded" style="animation:spin 1s linear infinite;">refresh</span>
            <span>Pull to refresh...</span>
        </div>

        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <span id="greeting">Good Afternoon</span>
                <h2 id="screen-title">Dashboard</h2>
            </div>
            <div class="header-actions">
                <button class="circle-btn" id="notif-btn">
                    <span class="material-symbols-rounded">notifications</span>
                    <span class="badge-dot" id="notif-dot"></span>
                </button>
                <button class="circle-btn" id="officer-menu-btn">
                    <span class="material-symbols-rounded">admin_panel_settings</span>
                </button>
                <button class="circle-btn" id="logout-btn">
                    <span class="material-symbols-rounded">logout</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="content"></main>

        <!-- FAB: QR Check-In -->
        <button id="fab-checkin" class="fab" aria-label="QR Check In">
            <span class="material-symbols-rounded">qr_code_scanner</span>
        </button>

        <!-- Officer Drawer -->
        <aside id="officer-drawer" class="drawer">
            <div class="drawer-header">
                <div class="drawer-title">
                    <span class="material-symbols-rounded">shield</span>
                    <h3>Officer Panel</h3>
                </div>
                <button id="close-drawer" class="circle-btn">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <nav class="drawer-menu">
                <button class="drawer-item" data-officer="dashboard">Dashboard</button>
                <button class="drawer-item" data-officer="members">Members</button>
                <button class="drawer-item" data-officer="manage-events">Manage Events</button>
                <button class="drawer-item" data-officer="announcements">Announcements</button>
                <button class="drawer-item" data-officer="badges">Badges</button>
                <button class="drawer-item" data-officer="grade-requests">Grade Requests</button>
                <button class="drawer-item" data-officer="grievances">Grievances</button>
                <button class="drawer-item" data-officer="leaderboard">Leaderboard</button>
                <button class="drawer-item" data-officer="analytics">Analytics</button>
            </nav>
        </aside>

        <!-- Overlay -->
        <div id="overlay" class="overlay"></div>

        <!-- Toast Container -->
        <div id="toast-container"></div>

        <!-- Modal Container -->
        <div id="modal-container"></div>

        <!-- Install Banner -->
        <section id="install-banner" class="install-banner hidden">
            <div>
                <h4>Install SEPOLSCIS App</h4>
                <p>Access the organization faster, even offline.</p>
            </div>
            <button id="install-btn" class="btn-primary">Install</button>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="home">
                <span class="material-symbols-rounded">home</span>
                <small>Home</small>
            </button>
            <button class="nav-item" data-screen="events">
                <span class="material-symbols-rounded">event</span>
                <small>Events</small>
            </button>
            <button class="nav-item" data-screen="learning">
                <span class="material-symbols-rounded">menu_book</span>
                <small>Learning</small>
            </button>
            <button class="nav-item" data-screen="profile">
                <span class="material-symbols-rounded">person</span>
                <small>Profile</small>
            </button>
        </nav>

    </section>

    <script type="module" src="app.js"></script>

    <script type="module">
        import { Auth, App } from './app.js';

        // Init auth and start app
        (async function() {
            if (await Auth.init()) {
                App.init();
            } else {
                window.location.href = 'login.html';
            }
        })();
    </script>

</body>

</html>
