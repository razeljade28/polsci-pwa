<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEPOLSCIS – Sign Up</title>
  <meta name="theme-color" content="#759954" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-circle bg-one"></div>
  <div class="bg-circle bg-two"></div>
  <div class="bg-circle bg-three"></div>

  <section id="signup-screen" class="screen active">
    <div class="login-wrapper">
      <div class="hero">
        <div class="hero-icon">
          <span class="material-symbols-rounded">how_to_reg</span>
        </div>
        <h1>Create Account</h1>
        <p>Join SEPOLSCIS – Student Excellence in Political Science</p>
      </div>
      <div class="login-card">
        <div class="login-header">
          <h2>Sign Up</h2>
          <span>Fill in your details</span>
        </div>
        <form id="signup-form">
          <div class="form-group">
            <label>Student ID</label>
            <div class="input-box">
              <span class="material-symbols-rounded">badge</span>
              <input type="text" id="signup-id" placeholder="2026-00001" required />
            </div>
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-box">
              <span class="material-symbols-rounded">person</span>
              <input type="text" id="signup-name" placeholder="Juan Dela Cruz" required />
            </div>
          </div>
          <div class="form-group">
            <label>Year Level</label>
            <div class="input-box">
              <span class="material-symbols-rounded">school</span>
              <select id="signup-year">
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Course</label>
            <div class="input-box">
              <span class="material-symbols-rounded">menu_book</span>
              <input type="text" id="signup-course" placeholder="B.A. Political Science" required />
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-box">
              <span class="material-symbols-rounded">lock</span>
              <input type="password" id="signup-password" placeholder="Create a password" required />
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-box">
              <span class="material-symbols-rounded">lock</span>
              <input type="password" id="signup-confirm" placeholder="Confirm password" required />
            </div>
          </div>
          <button type="submit" class="btn-primary">
            <span class="material-symbols-rounded">how_to_reg</span>
            Create Account
          </button>
        </form>
        <div style="text-align:center;margin-top:16px;">
          <span style="color:var(--text-light);">Already have an account? </span>
          <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Login</a>
        </div>
        <div class="login-footer" style="margin-top:12px;">
          <button class="text-btn" onclick="alert('SEPOLSCIS v2.0')">About</button>
          <button class="text-btn" id="install-prompt-btn">Install App</button>
        </div>
      </div>
    </div>
  </section>

  <div id="toast-container"></div>

  <script type="module" src="app.js"></script>
  <script type="module">
    import { Auth, UI } from './app.js';
    if (Auth.init()) window.location.href = 'index.html';

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentId = document.getElementById('signup-id').value.trim();
      const name = document.getElementById('signup-name').value.trim();
      const year = document.getElementById('signup-year').value;
      const course = document.getElementById('signup-course').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!studentId || !name || !course || !password || !confirm) {
        return UI.toast({ message: 'Please fill in all fields.', type: 'error' });
      }
      if (password.length < 6) {
        return UI.toast({ message: 'Password must be at least 6 characters.', type: 'error' });
      }
      if (password !== confirm) {
        return UI.toast({ message: 'Passwords do not match.', type: 'error' });
      }

      const result = await Auth.signup(studentId, password, name, year, course);
      if (result.success) {
        UI.toast({ message: 'Account created! Please login.', type: 'success' });
        setTimeout(() => window.location.href = 'login.html', 500);
      } else {
        UI.toast({ message: result.message, type: 'error' });
      }
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      document.getElementById('install-prompt-btn').addEventListener('click', () => {
        if (window.deferredPrompt) {
          window.deferredPrompt.prompt();
        } else {
          UI.toast({ message: 'Install from browser menu.', type: 'info' });
        }
      });
    });
  </script>
</body>
</html>
